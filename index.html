info-box\\\x22\x3e\\n  \x3cdiv class\x3d\\\x22info-inner\\\x22\x3e\\n    \x3cstrong\x3e\x3ch6\x3e📌 ประเภทสื่อที่สามารถส่งเข้ารับการตรวจสอบได้\x3c\\\/strong\x3e\x3c\\\/h6\x3e\\n    \x3cp\x3e\x3col\x3e\\n      \x3cli\x3e สื่อสิ่งพิมพ์ เช่น ป้าย, Roll up, Backdrop, แผ่นพับ, Infographic เป็นต้น\x3c\\\/li\x3e\\n      \x3cli\x3e สื่อกลางแจ้ง Out-Of-Home (OOH) ได้แก่ Static (ภาพนิ่ง) และ Digital (ภาพเคลื่อนไหว)\x3c\\\/li\x3e\\n      \x3cli\x3e สื่อในโรงภาพยนตร์\x3c\\\/li\x3e\\n      \x3cli\x3e สื่อออนไลน์ เช่น คอนเทนต์ออนไลน์, ภาพปก Facebook หรือ Infographic เป็นต้น\x3c\\\/li\x3e\\n      \x3cli\x3e สื่ออื่น ๆ\x3c\\\/li\x3e\\n    \x3c\\\/p\x3e\x3c\\\/ol\x3e\\n    * ฝสอ. จะตรวจสอบเฉพาะในส่วนของเอกลักษณ์องค์กรเพียงเท่านั้น\x3c\\\/li\x3e\\n  \x3c\\\/div\x3e\\n\\n  \x3cdiv class\x3d\\\x22info-inner\\\x22\x3e\\n    \x3cstrong\x3e\x3ch6\x3eℹ️ วิธีการดำเนินการ\x3c\\\/strong\x3e\x3c\\\/h6\x3e\\n    \x3cp\x3e\x3col\x3e\\n      \x3cli\x3e หน่วยงานจัดส่งชิ้นงานในระบบ โดยระบุรายละเอียดและอัพโหลดชิ้นงานให้ครบถ้วน\x3c\\\/li\x3e\\n      \x3cli\x3e สผภ. ตรวจสอบและพิจารณาให้ความเห็น พร้อมแจ้งกลับทางอีเมลล์ ภายใน 3 วันทำการ\x3c\\\/li\x3e\\n      \x3cli\x3e หากมีการแจ้งแก้ไขชิ้นงานจาก สผภ. และหน่วยงานดำเนินการปรับแก้แล้วเสร็จ ให้จัดส่งชิ้นงานเรื่องเดิมเข้าระบบอีกครั้ง\x3c\\\/li\x3e โดยแจ้งรอบที่ทำการจัดส่งให้ชัดเจน เช่น ชิ้นงาน A ส่งรอบที่ 1 (ฝสอ. มีความเห็นให้ปรับแก้)\x3c\\\/li\x3e\\n      เมื่อดำเนินการแก้ไขแล้วจัดส่งอีกครั้ง จะระบุเป็น ชิ้นงาน A รอบที่ 2 เป็นต้น\x3c\\\/li\x3e\\n    \x3c\\\/p\x3e\x3c\\\/ol\x3e\\n  \x3c\\\/div\x3e\\n  \x3cdiv class\x3d\\\x22info-inner\\\x22\x3e\\n    \x3cstrong\x3e📘 คู่มือเอกลักษณ์และมาสคอตการประปานครหลวง\x3c\\\/strong\x3e\x3cbr\x3e\\n    \x3c\\\/p class\x3d\\\x22info-text-small\\\x22\x3e\\n    สามารถตรวจสอบเอกลักษณ์องค์กรเบื้องต้นได้ที่ :\\n    \x3ca href\x3d\\\x22http:\/\/intra.mwa.co.th\/brand_mwa.html\\\x22 target\x3d\\\x22_blank\\\x22\x3e\\n    http:\/\/intra.mwa.co.th\/brand_mwa.html\\n    \x3c\\\/a\x3e\\n    \x3cstrong\x3e\x3c\\\/p class\x3d\\\x22info      ).toLocaleDateString(\\\x22th-TH\\\x22)\\n      : \\\x22-\\\x22;\\n\\n    const text \x3d `\\n      $\x7br.firstName || \\\x22\\\x22\x7d\\n      $\x7br.lastName || \\\x22\\\x22\x7d\\n      $\x7bcreatedDate\x7d\\n      $\x7br.department || \\\x22\\\x22\x7d\\n      $\x7br.phone || \\\x22\\\x22\x7d\\n      $\x7br.email || \\\x22\\\x22\x7d\\n      $\x7br.mediaType || \\\x22\\\x22\x7d\\n      $\x7br.workUrl || \\\x22\\\x22\x7d\\n      $\x7br.description || \\\x22\\\x22\x7d\\n      $\x7br.round || \\\x22\\\x22\x7d\\n      $\x7br.status || \\\x22\\\x22\x7d\\n      $\x7bupdatedDate\x7d\\n    `.toLowerCase();\\n\\n    return text.includes(historySearchTerm);\\n  \x7d);\\n\\n  if(filteredData.length \x3d\x3d\x3d 0)\x7b\\n    box.innerHTML \x3d historySearchTerm ? \\\x22ไม่พบข้อมูลที่ค้นหา\\\x22 : \\\x22ไม่มีข้อมูล\\\x22;\\n    return;\\n  \x7d\\n\\n  currentPage \x3d page;\\n\\n  const perPage \x3d 10;\\n  const start \x3d page * perPage;\\n  const end \x3d start + perPage;\\n\\n  const data \x3d filteredData.slice(start, end);\\n\\n  let html \x3d `\\n    \x3ctable class\x3d\\\x22table table-hover align-middle\\\x22\x3e\\n      \x3ctr\x3e\\n        \x3cth\x3eลำดับ\x3c\\\/th\x3e\\n        \x3cth\x3eชื่อ\x3c\\\/th\x3e\\n        \x3cth\x3eนามสกุล\x3c\\\/th\x3e\\n        \x3cth\x3eวันที่ส่ง\x3c\\\/th\x3e\\n        \x3cth\x3eหน่วยงาน\x3c\\\/th\x3e\\n        \x3cth\x3eเบอร์\x3c\\\/th\x3e\\n        \x3cth\x3eEmail\x3c\\\/th\x3e\\n        \x3cth\x3eประเภทสื่อ\x3c\\\/th\x3e\\n        \x3cth\x3eลิงก์ชิ้นงาน\x3c\\\/th\x3e\\n        \x3cth\x3eรายละเอียด\x3c\\\/th\x3e\\n        \x3cth\x3eรอบ\x3c\\\/th\x3e\\n        \x3cth\x3eสถานะ\x3c\\\/th\x3e\\n        \x3cth\x3eวันที่ให้ความเห็น\x3c\\\/th\x3e\\n      \x3c\\\/tr\x3e\\n  `;\\n\\n  let i \x3d start + 1;\\n\\n  data.forEach(r \x3d\x3e \x7b\\n    const createdDate \x3d r.createdAt\\n      ? new Date(\\n          r.createdAt.seconds ? r.createdAt.seconds * 1000 : r.createdAt\\n        ).toLocaleDateString(\\\x22th-TH\\\x22)\\n      : \ n\\n\/\/** \x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d TAB (ต้องอยู่บน window เพราะ HTML onclick เรียก) \x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d **\/\/\\nwindow.showTab \x3d function(tab, e)\x7b\\n  localStorage.setItem(\\\x22activeTab\\\x22, tab);\\n\\n  document.getElementById(\\\x22formTab\\\x22).style.display \x3d \\\x22none\\\x22;\\n  document.getElementById(\\\x22historyTab\\\x22).style.display \x3d \\\x22none\\\x22;\\n\\n  document.querySelectorAll(\\\x22.nav-link\\\x22).forEach(el \x3d\x3e el.classList.remove(\\\x22active\\\x22));\\n\\n  if(tab \x3d\x3d\x3d \\\x22form\\\x22)\x7b\\n    document.getElementById(\\\x22formTab\\\x22).style.display \x3d \\\x22block\\\x22;\\n  \x7d\\n\\n  if(tab \x3d\x3d\x3d \\\x22history\\\x22)\x7b\\n    document.getElementById(\\\x22historyTab\\\x22).style.display \x3d \\\x22block\\\x22;\\n    \/\/ กัน promise error ทำให้ UI ดูค้าง\\n    Promise.resolve(window.renderHistory(currentPage)).catch(()\x3d\x3e\x7b\x7d);\\n  \x7d\\n\\n  if(e \x26\x26 e.target) e.target.classList.add(\\\x22active\\\x22);\\n\x7d;\\n\\n\/** \x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d SUBMIT (กันหน้าขาวด้วย return false) \x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d **\/\\nwindow.handleSubmit \x3d function(e)\x7b\\n  e.preventDefault();\\n\\n  const data \x3d \x7b\\n    firstName: firstName.value,\\n    lastName: lastName.value,\\n    department: department.value,\\n    phone: phone.value,\\n    email: email.value,\\n    mediaType: mediaType.value,\\n    workUrl: workUrl.value,\\n    description: description.value,\\n    round: round.value\\n  \x7d;\\n\\n  Swal.fire(\x7btitle:\\\x22กำลังบันทึก...\\\x22, didOpen:()\x3d\x3eSwal.showLoading()\x7d);\\n\\n  google.script.run\\n    .withSuccessHandler(async ()\x3d\x3e\x7b\\n      try \x7b\\n        await saveDataFirebase(data);\\n      \x7d catch (err) \x7b\\n        console.error(err);\\n        Swal.fire(\\\x22Error\\\x22, \\\x22บันทึก Firestore ไม่สำเร็จ: \\\x22 + err.message, \\\x22error\\\x22);\\n        return;\\n      \x7d\\n\\n      Swal.fire(\\\x22สำเร็จ\\\x22,\\\x22บันทึกเรียบร้อย\\\x22,\\\x22success\\\x22);\\n\\n      \/\/ refresh history cache แล้วพาไป history\\n      historyData \x3d \x5b\x5d;\\n      currentPage \x3d 0;\\n      await window.renderHistory(0);\\n      window.showTab(\\\x22history\\\x22);\\n    \x7d)\\n    .withFailureHandler(err\x3d\x3e\x7b\\n      Swal.fire(\\\x22Error\\\x22, err.message, \\\x22error\\\x22);\\n    \x7d)\\n    .saveData(data);\\n\\n  return false; \/\/ ✅ กันฟอร์ม submit แล้วหน้าเปลี่ยนเป็นขาว\\n\x7d;\\n\\n\/** \x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d ADMIN (เด้งถามเฉพาะตอนกดปุ่ม) \x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d **\/\\nwindow.requestAdmin \x3d async function(e)\x7b\\n  if(e) e.preventDefault();\\n\\n  if(!WEBAPP_URL)\x7b\\n    Swal.fire(\\\x22Error\\\x22, \\\x22ไม่พบ WEBAPP_URL จากระบบ\\\x22, \\\x22error\\\x22);\\n    return;\\n  \x7d\\n\\n  window.open(WEBAPP_URL + \\\x22?page\x3dadmin\\\x22, \\\x22_blank\\\x22);\\n\x7d;\\n\\n\\n\/** \x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d INIT \x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d\x3d **\/\\nwindow.addEventListener(\\\x22DOMContentLoaded\\\x22, ()\x3d\x3e\x7b\\n  const saved \x3d localStorage.getItem(\\\x22activeTab\\\x22) || \\\x22form\\\x22;\\n  window.showTab(saved);\\n\\n  \/\/ set active tab button (0\x3dform,1\x3dhistory,2\x3dadmin)\\n  const btns \x3d document.querySelectorAll(\\\x22.nav-link\\\x22);\\n  if(saved \x3d\x3d\x3d \\\x22form\\\x22) btns\x5b0\x5d?.classList.add(\\\x22active\\\x22);\\n  if(saved \x3d\x3d\x3d \\\x22history\\\x22) btns\x5b1\x5d?.classList.add(\\\x22active\\\x22);\\n\x7d);\\n\x3c\\\/script\x3e\\n\\n\x3c\\\/body\x3e\\n\x3c\\\/html\x3e\x22,\x22ncc\x22:\x22\x7b\\\x22awhs\\\x22:true\x7d\x22\x7d", "ACHNxQxZWMBFvrAnA1RcG
