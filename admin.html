<div class="topbar">

  </div>

  </div>

<div class="container-main">
 
<div class="form-card">

  <h4 style="margin-bottom:20px;color:#065BAA;font-weight:700;">
    รายการชิ้นงานทั้งหมด
  </h4>

      type="text"

      class="search-input"

    >

  </div>

<footer>

</footer>

<script>

document.getElementById("adminList").innerHTML = "⏳ กำลังโหลดชิ้นงาน...";
console.log("ADMIN START");


const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "ci-verification.firebaseapp.com",
  projectId: "ci-verification"
};

// กัน initialize ซ้ำ
if (!firebase.apps.length) {
  firebase.initializeApp(firebaseConfig);
}

const db = firebase.firestore();

let adminData = [];
let adminPage = 0;
let adminSearchTerm = "";
const ADMIN_PER_PAGE = 10;

window.handleAdminSearch = function(value){
  adminSearchTerm = value.trim().toLowerCase();
  adminPage = 0;
  renderAdmin(0);
};

/* LOAD ADMIN DATA */
async function renderAdmin(page = 0) {
  try {
    if (adminData.length === 0) {
      const snapshot = await db
        .collection("submissions")
        .orderBy("createdAt", "desc")
        .limit(50)
        .get();

      if (snapshot.empty) {
        document.getElementById("adminList").innerHTML = "ไม่มีข้อมูล";
        return;
      }

      adminData = snapshot.docs.map(docSnap => ({
        id: docSnap.id,
        ...docSnap.data()
      }));
    }

    adminPage = page;

    const filteredAdminData = adminData.filter(d => {
      const createdDate = d.createdAt?.seconds
        ? new Date(d.createdAt.seconds * 1000).toLocaleDateString("th-TH")
        : "-";

      const updatedDate = d.updatedAt?.seconds
        ? new Date(d.updatedAt.seconds * 1000).toLocaleDateString("th-TH")
        : "-";

      const text = `
        ${d.firstName || ""}
        ${d.lastName || ""}
        ${createdDate}
        ${d.department || ""}
        ${d.phone || ""}
        ${d.email || ""}
        ${d.mediaType || ""}
        ${d.workUrl || ""}
        ${d.description || ""}
        ${d.round || ""}
        ${d.status || ""}
        ${updatedDate}
        ${d.comment || ""}
        ${d.by || ""}
      `.toLowerCase();

      return text.includes(adminSearchTerm);
    });

    if(filteredAdminData.length === 0){
      document.getElementById("adminList").innerHTML = adminSearchTerm ? "ไม่พบข้อมูลที่ค้นหา" : "ไม่มีข้อมูล";
      return;
    }

    const start = page * ADMIN_PER_PAGE;
    const end = start + ADMIN_PER_PAGE;
    const pageData = filteredAdminData.slice(start, end);

    let html = `
      <div>
      <table class="table table-hover align-middle table-bordered">
      <tr>
        <th>ลำดับ</th>
        <th>ชื่อ</th>
        <th>นามสกุล</th>
        <th>วันที่ส่ง</th>
        <th>หน่วยงาน</th>
        <th>เบอร์</th>
        <th>Email</th>
        <th>ประเภทสื่อ</th>
        <th>ชิ้นงาน</th>
        <th>รายละเอียด</th>
        <th>รอบ</th>
        <th>สถานะ</th>
        <th>วันที่ให้ความเห็น</th>
        <th>ความคิดเห็น</th>
        <th>ผู้ให้ความเห็น</th>
        <th>บันทึก</th>
      </tr>
    `;

    let i = start + 1;

    pageData.forEach(d => {
      const id = d.id;

      const createdDate = d.createdAt?.seconds
        ? new Date(d.createdAt.seconds * 1000).toLocaleDateString("th-TH")
        : "-";

      const updatedDate = d.updatedAt?.seconds
        ? new Date(d.updatedAt.seconds * 1000).toLocaleDateString("th-TH")
        : "-";

      html += `
        <tr data-workurl="${(d.workUrl || "").replace(/"/g, "&quot;")}"
            data-email="${(d.email || "").replace(/"/g, "&quot;")}"
            data-name="${((d.firstName||"") + " " + (d.lastName||"")).replace(/"/g, "&quot;")}">
          <td>${i++}</td>
          <td>${d.firstName || ""}</td>
          <td>${d.lastName || ""}</td>
          <td>${createdDate}</td>
          <td>${d.department || ""}</td>
          <td>${d.phone || ""}</td>
          <td>${d.email || ""}</td>
          <td><div class="media-scroll-admin">${d.mediaType || ""}</div></td>
          <td><a href="${d.workUrl || "#"}" target="_blank">ชิ้นงาน</a></td>
          <td><div class="detail-scroll-admin">${d.description || ""}</div></td>
          <td>${d.round || ""}</td>

          <td>
            <select id="status_${id}" class="form-select form-select-sm">
              <option value="รอพิจารณา" ${d.status==="รอพิจารณา" ? "selected":""}>รอพิจารณา</option>
              <option value="ปรับแก้" ${d.status==="ปรับแก้" ? "selected":""}>ปรับแก้</option>
              <option value="ผ่าน" ${d.status==="ผ่าน" ? "selected":""}>ผ่าน</option>
            </select>
          </td>

          <td>${updatedDate}</td>

          <td>
            <textarea id="comment_${id}" class="form-control" rows="3">${d.comment || ""}</textarea>
          </td>

          <td>
            <input id="by_${id}" class="form-control" value="${d.by || ""}">
          </td>

          <td>
            <button class="btn btn-success btn-sm" onclick="saveAdmin('${id}', this)">💾</button>
          </td>
        </tr>
      `;
    });

    html += `</table>`;

    html += `<div style="text-align:center;margin-top:15px;">`;
    if(page > 0){
      html += `<button class="btn btn-secondary btn-sm" onclick="renderAdmin(${page-1})">⬅️ ก่อนหน้า</button> `;
    }
    if(end < filteredAdminData.length){
      html += `<button class="btn btn-primary btn-sm" onclick="renderAdmin(${page+1})">ถัดไป ➡️</button>`;
    }
    html += `</div></div>`;

    document.getElementById("adminList").innerHTML = html;

  } catch (err) {
    console.error(err);
    document.getElementById("adminList").innerHTML =
      "<div style='color:red'>" + err.message + "</div>";
  }
}

/* SAVE */
window.saveAdmin = async function(id, btnEl) {
  try {
    const status = document.getElementById(`status_${id}`).value;
    const comment = document.getElementById(`comment_${id}`).value;
    const by = document.getElementById(`by_${id}`).value;

    // ✅ ดึงข้อมูลจากแถว เพื่อ sync sheet/email
    const tr = btnEl.closest("tr");
    const workUrl = tr?.dataset?.workurl || "";
    const email = tr?.dataset?.email || "";
    const name = tr?.dataset?.name || "";

    // 1) update firestore
    await db.collection("submissions").doc(id).update({
      status,
      comment,
      by,
      updatedAt: new Date()
    });

    // 2) update google sheet (ใช้ workUrl เป็น key)
    if (workUrl) {
      google.script.run.updateStatusByLink(workUrl, status, comment, by);
    }

    // 3) send email
    if (email) {
      google.script.run.sendEmailUpdate(email, name, status, comment, workUrl);
    }

Swal.fire("สำเร็จ", "บันทึกข้อมูลแล้ว", "success");
adminData = [];
renderAdmin(adminPage);

  } catch (err) {
    Swal.fire("ERROR", err.message, "error");
  }
};

/* EMAIL ACCESS */
async function askEmailAccess(){
  const { value: formValues } = await Swal.fire({
    title: "เข้าสู่ระบบ Admin",
    html: `
      <input id="swal-admin-email" class="swal2-input" placeholder="Email">
      <input id="swal-admin-password" type="password" class="swal2-input" placeholder="Password">
    `,
    focusConfirm: false,
    confirmButtonText: "เข้าสู่ระบบ",
    allowOutsideClick: false,
    preConfirm: () => {
      const email = document.getElementById("swal-admin-email").value.trim();
      const password = document.getElementById("swal-admin-password").value;

      if (!email || !password) {
        Swal.showValidationMessage("กรุณากรอก Email และ Password ให้ครบ");
        return false;
      }

      return { email, password };
    }
  });

  if(!formValues) return askEmailAccess();

  google.script.run
    .withSuccessHandler(res => {
      console.log("ACCESS", res);
      if(res && res.access) renderAdmin();
      else document.getElementById("adminList").innerHTML = "⛔ Email หรือ Password ไม่ถูกต้อง";
    })
    .withFailureHandler(err => {
      console.error(err);
      document.getElementById("adminList").innerHTML = "❌ " + err.message;
    })
    .checkEmailManual(formValues.email, formValues.password);
}

window.addEventListener("DOMContentLoaded", () => {
  askEmailAccess();
});

</script>
